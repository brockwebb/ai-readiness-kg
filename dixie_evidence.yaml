# dixie.evidence config instance — ai-readiness-kg
# Written by task 2026-07-04_dixie_b0_evidence_layer (Stage 3 acceptance run).
# The package is schema-neutral; everything project-specific lives here.

project: ai-readiness-kg
corpus_root: corpus
evidence_dir: corpus/evidence
quarantine_dir: corpus/quarantine
inbox_dir: corpus/inbox
promote_dir: corpus/bulk          # verified inbox fulfillments land here
document_dirs: [bulk, bulk_md, pilot, cisco]
manifest_out: corpus/manifest.json  # v2 projection; v1 preserved at corpus/manifest.v1.json

integrity:
  min_bytes:
    # observed garbage: HTML stubs 468-1817 B, Cloudflare cluster 5.5-6 KB.
    # 7000 sits just below the smallest legitimate PDF now in corpus — the
    # standalone §515 Data Quality Act excerpt (1-page statute, 7,577 B,
    # operator-verified 2026-07-17) — while still clearing the ≤6 KB garbage
    # cluster with margin. magic (Cloudflare/HTML pages sniff as html → fail)
    # + smoke (pdf_min_chars) are the real gates; the floor is coarse
    # belt-and-suspenders and must not reject genuine small statutory excerpts.
    # Lowered 8000→7000 on 2026-07-17 (false-positive on §515) — see task
    # cc_tasks/2026-07-16_finish_bulk_extraction_v1_remaining8.
    pdf: 7000
    markdown: 256
    text: 256
  pdf_min_chars: 200
  pdf_smoke_max_pages: 10
  text_min_chars: 200

# Identity admission gate (source-access tactical Stage 1). A record whose
# connector-supplied signals fail these DECLARED thresholds cannot reach `included`
# — it is forced to pending_refetch. Belt-and-suspenders: title match AND extent
# sanity. require_signals_for_included stays False so the 71 pre-gate v1 docs (admitted
# before signals existed) are grandfathered; every connector/inbox admission carries
# signals and is gated.
identity_gate:
  title_token_overlap_floor: 0.3
  require_signals_for_included: false
  extent_sanity:
    BILLS: {max_bytes: 2000000, max_pages: 150}
    PLAW: {max_bytes: 3000000, max_pages: 500}

# Prior screening artifacts — imported once, preserved verbatim in the event
# log. Order matters: manifest v1 first (its doc_ids are the join key to the
# pilot's assertion events), then the candidate register (PRISMA-style
# screening decisions), which merges by normalized source URL.
imports:
  - source_id: manifest_v1
    path: corpus/manifest.v1.json
    format: json
    records_path: documents
    doc_id_from: null
    map:
      doc_id: doc_id
      title: title
      authors_or_org: authors
      pub_year: pub_date
      doc_type: source_type
      source_url: primary_url
      local_path: local_path
      expected_sha256: content_hash
      rationale: inclusion_rationale
      status: status
      acquisition_method: acquisition.acquisition_method
      acquired_by: discovered_via
    status_map:
      active: included
  - source_id: candidate_register
    path: corpus/staging/candidate_register.jsonl
    format: jsonl
    doc_id_from: title_slug
    map:
      title: title
      source_url: primary_url
      authors_or_org: authors
      pub_year: year
      doc_type: source_type
      rationale: decision_reason
      status: status
      decided_by: decided_by
      decided_at: decided_at
      notes: notes
    status_map:
      manifested: included
      needs_source: pending_refetch
      excluded: excluded

channel_hints:
  - {url_contains: arxiv.org, channel: "arxiv API (harvester connector exists)"}
  - {url_contains: govinfo.gov, channel: "govinfo direct PDF pattern"}
  - {url_contains: federalregister.gov, channel: "Federal Register API"}
  - {url_contains: nist.gov, channel: "nist.gov direct PDF"}

# R4 — pre-registered baseline gate. DEFINITION ONLY; execution is
# post-extraction and not implemented in this component. Check definitions
# ported from what fss-policy-kg actually ran (sources cited per check).
# TO_BE_SET values are operator decisions — dixie never invents thresholds.
baseline_gate:
  preregistered: true
  min_verified_included: 71   # corpus epoch v1 freeze — event 0ba4e3f764e64cb8ba1a7155fd6eee3f, task 2026-07-05_airkg_bulk_extraction_v1 Stage 1
  # v1 PRE-REGISTERED thresholds (Stage 2, task 2026-07-05_airkg_bulk_extraction_v1):
  # ported from fss-policy-kg's REALIZED values, read 2026-07-05 from its run
  # artifacts (cited per check). One doctrine override: grounding is
  # ZERO-UNGROUNDED ABSOLUTE, not a rate.
  # EXPECTATION: this heterogeneous corpus (academic PDFs, web-md captures,
  # statutes, industry decks) may FAIL the edge/orphan/empty gates that a
  # single-genre statutory corpus passed. A failed gate triggers
  # INVESTIGATION, never retuning to pass. Pre-registered values stand for v1.
  post_extraction_checks:
    - check_id: grounding_zero_ungrounded
      definition: >-
        Count of ADMITTED items whose grounding span fails the verifier.
        Absolute zero: an ungrounded item is rejected/quarantined at parse,
        never admitted — rejections are recorded, not silently dropped.
      comparator: eq
      threshold: 0
      source: >-
        fss realized: 0 ungrounded admitted across 6,237 extraction events
        (e3_full_drain_report.md §1); 6,481/6,481 grounded=true in live graph
        (kg_intrinsic_quality_report.md §4). Doctrine override per task:
        absolute, not a rate.
    - check_id: quarantine_rate
      definition: >-
        Fraction of parsed items rejected by parser gates (grounding miss,
        schema violation) across the run. Per-doc 10% STOP discipline is
        enforced in-run by the driver (ai-r pilot v5 protocol).
      comparator: lte
      threshold: 0.0152
      scope: run
      source: >-
        fss realized: 123 failed segments / 8,078 eligible = 1.52%
        (e3_full_drain_report.md §2-3; failures dominated by the grounding
        guard honestly rejecting OCR-corrupted source).
    - check_id: edge_endpoint_validation
      definition: >-
        Every asserted edge resolves both endpoints to existing nodes and its
        (from,to) pair is allowed by schema.yaml. Count of violations.
      comparator: eq
      threshold: 0
      source: >-
        fss realized: 0 out-of-vocabulary force values, 0 obligations missing
        source-doc provenance (kg_intrinsic_quality_report.md §2, §4).
    - check_id: orphan_rate
      definition: >-
        Fraction of non-Document nodes with zero relationships after
        projection build.
      comparator: lte
      threshold: 0.0034
      source: >-
        fss realized: 22/6,481 obligations lacking their STATES segment link =
        0.34% — the graph's structural-orphan analog
        (kg_intrinsic_quality_report.md §2 orphan/dangling checks).
    - check_id: projection_drift
      definition: >-
        Replay the event log into a scratch database and diff against live:
        node/rel counts and per-document fingerprints. Zero divergence is
        definitional (ported check exits nonzero on ANY diff), not an
        operator dial.
      comparator: eq
      threshold: 0
      source: "fss kg/drift_check.py + drift_check_report.md (realized: clean)"
    - check_id: empty_extraction_rate
      definition: >-
        Fraction of included docs yielding zero extracted items.
      comparator: lte
      threshold: 0.1196
      source: >-
        fss realized: 11/92 documents with zero obligations = 11.96%, of which
        5 documented leave-empties + 4 genuinely narrative
        (kg_intrinsic_quality_report.md §1 population completeness).
