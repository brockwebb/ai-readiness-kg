# ai-readiness-kg extraction schema v0.1
# Transcribed from docs/schema_v0.1.md sections 2-4. Source of truth is that doc.
# Transcription only — no invention. Bump this version via the proposed_relationships
# review process (schema_v0.1.md section 6), never by silent edit.
#
# Changelog:
#   2026-07-03 (task 2026-07-03_extraction_module, rider R1): added `intergovernmental`
#     to Document.source_type for policy bodies (OECD, UNESCO, UNDP, IADB, PARIS21,
#     EU JRC, UN). Standards bodies / SDOs (ITU, ISO) remain `standard`. Schema still
#     draft/unlocked, so the value is added directly rather than via version bump.
schema_version: "0.1"

# --- Section 2: Node types -------------------------------------------------
# Each node type lists the "Key properties" column verbatim. Parenthetical
# enumerations from the doc are carried as a `values:` list on that property.
node_types:
  Document:
    what: A manifest entry. Primary source only.
    properties:
      - doc_id
      - title
      - authors
      - pub_date
      - source_type      # federal / academic / industry / standard / intergovernmental
      - primary_url
      - content_hash
      - manifest_event_id
    property_values:
      source_type: [federal, academic, industry, standard, intergovernmental]

  Definition:
    what: A verbatim definition of a term as given by one source.
    properties:
      - term
      - verbatim_text
      - grounding_span
      - normative_status  # statute / policy / standard / academic / industry
      - as_of_date
    property_values:
      normative_status: [statute, policy, standard, academic, industry]

  Concept:
    what: Any substantive idea a document uses. Exhaustive layer, extracted first-class from event one.
    properties:
      - name
      - aliases
      - description
      - grounding_span

  Construct:
    what: A measurable readiness dimension (e.g. discoverability, provenance completeness). A Concept promoted to measurability.
    properties:
      - name
      - description
      - measurement_notes

  Instrument:
    what: An existing assessment, survey, index, or benchmark.
    properties:
      - name
      - owner
      - year
      - method

  Measure:
    what: An individual item or metric inside an Instrument.
    properties:
      - text
      - response_type
      - grounding_span

  Claim:
    what: A falsifiable assertion a document makes (X improves Y, A requires B).
    properties:
      - claim_text
      - grounding_span
      - claim_type        # empirical / normative / speculative
    property_values:
      claim_type: [empirical, normative, speculative]

  Standard:
    what: A technical spec (DCAT, ISO 19115, schema.org, llms.txt, MCP).
    properties:
      - name
      - version
      - steward
      - as_of_date

  Framework:
    what: A conceptual structure (NIST AI RMF, FAIR, Data Readiness Levels).
    properties:
      - name
      - owner
      - year

# --- Section 3: Edge types -------------------------------------------------
# from/to/meaning transcribed from the "From -> To" and "Meaning" columns.
# `pairs` is the AUTHORITATIVE, machine-enforced list of legal (from_type, to_type)
# endpoint pairs for each edge type (strict index-pairing, not the from x to cross
# product). from/to are kept for human readability. `symmetric: true` marks the doc's
# bidirectional arrow (<->). Constraint enforcement is type-validity only (schema
# section 3): an edge type not listed cannot be written; a whitelisted edge whose
# endpoints are not a legal pair is a schema-expressiveness signal, not graph data —
# the parser routes it to proposed_relationships (§9 measurement), never the graph.
#
# Changelog:
#   2026-07-03 (task 2026-07-03_pilot_extraction_run, precondition rider): added
#     explicit `pairs` to every edge type; parser now enforces strict index-pairing.
#     Cross-pair edges on a whitelisted type route to proposed_relationships.
edge_types:
  defines:
    from: Document
    to: Definition
    pairs: [[Document, Definition]]
    meaning: Source gives this definition

  mentions:
    from: Document
    to: Concept
    pairs: [[Document, Concept]]
    meaning: Concept appears substantively (not keyword match)

  asserts:
    from: Document
    to: Claim
    pairs: [[Document, Claim]]
    meaning: Source makes this claim

  about:
    from: Claim
    to: Concept
    pairs: [[Claim, Concept]]
    meaning: What the claim concerns

  operationalizes:
    from: Instrument
    to: Construct
    pairs: [[Instrument, Construct]]
    meaning: Instrument measures this dimension

  measures:
    from: Measure
    to: Construct
    pairs: [[Measure, Construct]]
    meaning: Item-level mapping

  grounds:
    from: Construct
    to: Definition
    pairs: [[Construct, Definition]]
    meaning: Construct's authority traces to this definition

  extends:
    # doc: "Definition -> Definition, Framework -> Framework" (index-paired, NOT cross)
    from: [Definition, Framework]
    to: [Definition, Framework]
    pairs: [[Definition, Definition], [Framework, Framework]]
    meaning: Builds on, adds to

  conflicts_with:
    # doc: "Definition <-> Definition, Claim <-> Claim"
    from: [Definition, Claim]
    to: [Definition, Claim]
    pairs: [[Definition, Definition], [Claim, Claim]]
    symmetric: true
    meaning: Incompatible. The "no shared definition" evidence layer

  cites:
    from: Document
    to: Document
    pairs: [[Document, Document]]
    meaning: Citation within the corpus

  builds_on:
    # doc: "Standard/Framework -> Standard/Framework" (either type on either end = cross product)
    from: [Standard, Framework]
    to: [Standard, Framework]
    pairs: [[Standard, Standard], [Standard, Framework], [Framework, Standard], [Framework, Framework]]
    meaning: e.g. FCSM 25-03 builds_on OPEN Gov Data Act

  implements:
    from: Standard
    to: Concept
    pairs: [[Standard, Concept]]
    meaning: Spec realizes a concept

# --- Section 4: Universal provenance properties ----------------------------
# Every node and edge extracted from a document carries these. No grounding
# span, no write. Curated nodes (Construct promotions, the North Star artifact)
# carry a rationale and operator id instead (see doc section 4).
provenance_required:
  - grounding_span      # verbatim quote from the source
  - location            # section heading or page as available
  - extraction_event_id
  - model_id
  - schema_version
  - timestamp
